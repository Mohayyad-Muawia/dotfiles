# Generated by HyprMod


# Environment
env = XCURSOR_THEME,Bibata-Modern-Ice
env = XCURSOR_SIZE,24

decoration:blur:brightness = 1.0
decoration:blur:enabled = true
decoration:blur:passes = 1
decoration:blur:popups = false
decoration:blur:size = 8
decoration:inactive_opacity = 1.0
decoration:rounding = 0
general:border_size = 1
general:col.active_border = 0xffffffff 0deg
general:layout = scrolling
general:resize_on_border = false
input:follow_mouse = 1

# Monitors
monitor = eDP-1, 1920x1080@60.01Hz, 0x0, 1, cm, srgb

# Keybinds
bind = SUPER SHIFT, F, fullscreen, 0
bind = SUPER, B, exec, brave
bind = SUPER, Print, global, caelestia:screenshotFreeze
bind = SUPER SHIFT, BackSpace, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit

# Autostart
exec-once = caelestia shell -d
